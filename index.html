<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trợ Lý Đếm Ngược Siêu Tốc (Supabase Cloud)</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #4f46e5, #3b82f6);
            --danger-color: #ef4444;
            --warning-color: #f59e0b;
            --success-color: #10b981;
            --bg-gradient: linear-gradient(135deg, #f0fdf4 0%, #e0f2fe 100%);
            --card-bg: #ffffff;
            --text-main: #1e293b;
        }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg-gradient); min-height: 100vh; margin: 0; padding: 30px 20px; color: var(--text-main); }
        .container { max-width: 1000px; margin: 0 auto; }
        h1 { text-align: center; color: #1e3a8a; font-size: 2.2rem; margin-bottom: 25px; }
        
        .sync-status { text-align: center; font-size: 13px; font-weight: bold; margin-bottom: 15px; padding: 6px; border-radius: 20px; display: none; }
        .sync-loading { background: #fef3c7; color: #d97706; }
        .sync-success { background: #d1fae5; color: #065f46; }
        .sync-failed { background: #fee2e2; color: #b91c1c; }

        /* Khung nhập URL & KEY của Supabase - phiên bản gọn, đặt cuối trang */
        .config-footer {
            margin-top: 30px;
            text-align: center;
        }
        .config-toggle-btn {
            width: auto;
            display: inline-block;
            background: none;
            border: 1px dashed #cbd5e1;
            color: #64748b;
            font-size: 13px;
            font-weight: 600;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
        }
        .config-toggle-btn:hover { background-color: #f1f5f9; color: #334155; }
        .config-container {
            background: #f1f5f9;
            border: 1px solid #cbd5e1;
            padding: 15px;
            border-radius: 12px;
            margin-top: 12px;
            text-align: left;
            box-shadow: 0 4px 10px rgba(0,0,0,0.02);
        }
        .config-grid {
            display: grid;
            grid-template-columns: 1fr 2fr auto;
            gap: 10px;
            align-items: end;
        }
        @media (max-width: 768px) { .config-grid { grid-template-columns: 1fr; } }
        
        .btn-save-config { background: #0f172a; color: white; border: none; font-weight: bold; cursor: pointer; height: 45px;}

        .form-container { background-color: var(--card-bg); padding: 25px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); margin-bottom: 30px; }
        .form-group { display: grid; grid-template-columns: 2fr 1.2fr 1fr 1fr 1.5fr auto; gap: 15px; align-items: end; }
        .repeat-options { display: flex; gap: 5px; }
        .repeat-options input { width: 60px; text-align: center; }
        @media (max-width: 950px) { .form-group { grid-template-columns: 1fr; } }
        
        label { font-weight: 600; font-size: 14px; margin-bottom: 8px; display: block; color: #475569; }
        input, select, button { width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 8px; box-sizing: border-box; font-size: 14px; transition: all 0.3s ease; }
        
        button.btn-add { background: var(--primary-gradient); color: white; border: none; cursor: pointer; font-weight: bold; }
        button.btn-update-mode { background: linear-gradient(135deg, #f59e0b, #d97706); }
        
        .toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; flex-wrap: wrap; gap: 10px; }
        .toolbar-buttons { display: flex; gap: 10px; flex-wrap: wrap; }
        .view-btn, .sync-manual-btn { width: auto; padding: 8px 16px; background-color: #e2e8f0; color: #475569; border: none; font-weight: 600; border-radius: 6px; cursor: pointer; }
        .view-btn.active { background: var(--primary-gradient); color: white; }
        .sync-manual-btn.notify-on { background-color: #d1fae5; color: #065f46; }
        .filter-toolbar { margin-bottom: 20px; }
        .filter-select {
            width: auto;
            padding: 8px 14px;
            background-color: #e2e8f0;
            color: #334155;
            border: none;
            font-weight: 600;
            font-size: 13px;
            border-radius: 6px;
            cursor: pointer;
        }
        .filter-select:focus { outline: 2px solid #3b82f6; }

        .reminder-badge { display: inline-block; background-color: #fff7ed; color: #c2410c; padding: 4px 10px; border-radius: 6px; font-size: 11px; font-weight: 600; margin-top: 8px; margin-left: 6px; border: 1px solid #fed7aa; }
        
        .events-list { display: grid; gap: 15px; }
        .events-list.grid-view { grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); }
        .event-card { background-color: var(--card-bg); padding: 20px; border-radius: 14px; box-shadow: 0 4px 10px rgba(0,0,0,0.02); display: flex; justify-content: space-between; align-items: center; border-left: 6px solid #3b82f6; position: relative; overflow: hidden; }
        .events-list.grid-view .event-card { flex-direction: column; align-items: flex-start; justify-content: space-between; min-height: 160px; border-left: none; border-top: 6px solid #3b82f6; }

        /* Hình nền mặc định theo hạng mục: tờ giấy cho "Giấy tờ", đồng hồ cho "Ngày quan trọng" */
        .event-card.cat-giayto { background: linear-gradient(135deg, #e0f2fe 0%, #bae6fd 100%); }
        .event-card.cat-quantrong { background: linear-gradient(135deg, #fee2e2 0%, #fecaca 100%); }

        .event-card.cat-giayto::after,
        .event-card.cat-quantrong::after {
            content: "";
            position: absolute;
            right: -14px;
            bottom: 12px;
            width: 150px;
            height: 150px;
            background-repeat: no-repeat;
            background-size: contain;
            background-position: bottom right;
            opacity: 0.4;
            transform: rotate(-12deg);
            pointer-events: none;
            z-index: 0;
        }
        .events-list.grid-view .event-card.cat-giayto::after,
        .events-list.grid-view .event-card.cat-quantrong::after {
            width: 130px;
            height: 130px;
        }
        .event-card.cat-giayto::after {
            background-image: url("data:image/svg+xml;base64,PHN2ZyB4bWxucz0naHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmcnIHZpZXdCb3g9JzAgMCAyNCAyNCc+PHBhdGggZmlsbD0nIzFlNDBhZicgZD0nTTYgMmg4bDUgNXYxNWExIDEgMCAwIDEtMSAxSDZhMSAxIDAgMCAxLTEtMVYzYTEgMSAwIDAgMSAxLTF6JyBvcGFjaXR5PScwLjknLz48cGF0aCBmaWxsPScjOTNjNWZkJyBkPSdNMTQgMnY1aDV6Jy8+PHJlY3QgeD0nOCcgeT0nMTIuNScgd2lkdGg9JzgnIGhlaWdodD0nMS40JyByeD0nMC43JyBmaWxsPSd3aGl0ZScvPjxyZWN0IHg9JzgnIHk9JzE2JyB3aWR0aD0nOCcgaGVpZ2h0PScxLjQnIHJ4PScwLjcnIGZpbGw9J3doaXRlJy8+PHJlY3QgeD0nOCcgeT0nOScgd2lkdGg9JzQnIGhlaWdodD0nMS40JyByeD0nMC43JyBmaWxsPSd3aGl0ZScvPjwvc3ZnPg==");
        }
        .event-card.cat-quantrong::after {
            background-image: url("data:image/svg+xml;base64,PHN2ZyB4bWxucz0naHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmcnIHZpZXdCb3g9JzAgMCAyNCAyNCc+PGNpcmNsZSBjeD0nMTInIGN5PScxMicgcj0nMTAnIGZpbGw9JyNiOTFjMWMnIG9wYWNpdHk9JzAuOScvPjxjaXJjbGUgY3g9JzEyJyBjeT0nMTInIHI9JzguNScgZmlsbD0nbm9uZScgc3Ryb2tlPSd3aGl0ZScgc3Ryb2tlLXdpZHRoPScwLjgnLz48bGluZSB4MT0nMTInIHkxPScxMicgeDI9JzEyJyB5Mj0nNi41JyBzdHJva2U9J3doaXRlJyBzdHJva2Utd2lkdGg9JzEuNCcgc3Ryb2tlLWxpbmVjYXA9J3JvdW5kJy8+PGxpbmUgeDE9JzEyJyB5MT0nMTInIHgyPScxNicgeTI9JzEzLjUnIHN0cm9rZT0nd2hpdGUnIHN0cm9rZS13aWR0aD0nMS40JyBzdHJva2UtbGluZWNhcD0ncm91bmQnLz48L3N2Zz4=");
        }

        .event-card .event-info,
        .event-card .countdown-display {
            position: relative;
            z-index: 1;
        }
        
        .event-card.urgent { border-left-color: var(--danger-color); }
        .event-card.warning { border-left-color: var(--warning-color); }
        .event-card.safe { border-left-color: var(--success-color); }
        .event-card.expired { border-left-color: #94a3b8; opacity: 0.7; }
        
        .events-list.grid-view .event-card.urgent { border-top-color: var(--danger-color); }
        .events-list.grid-view .event-card.warning { border-top-color: var(--warning-color); }
        .events-list.grid-view .event-card.safe { border-top-color: var(--success-color); }
        .events-list.grid-view .event-card.expired { border-top-color: #94a3b8; }
        
        .event-info h3 { margin: 0 0 8px 0; color: #0f172a; font-size: 1.1rem; }
        .event-info p { margin: 0; font-size: 13px; color: #64748b; }
        .repeat-badge { display: inline-block; background-color: #f0fdf4; color: #166534; padding: 4px 10px; border-radius: 6px; font-size: 11px; font-weight: 600; margin-top: 8px; border: 1px solid #bbf7d0; }
        
        .countdown-display { text-align: right; display: flex; align-items: center; gap: 15px; }
        .events-list.grid-view .countdown-display { width: 100%; justify-content: space-between; margin-top: 15px; padding-top: 10px; border-top: 1px dashed #e2e8f0; }
        .days-left { font-size: 18px; font-weight: 700; }
        
        .urgent .days-left { color: var(--danger-color); }
        .warning .days-left { color: var(--warning-color); }
        .safe .days-left { color: var(--success-color); }
        
        .action-btns { display: flex; gap: 6px; }
        .edit-btn { background-color: #fef3c7; color: #d97706; border: 1px solid #fde68a; font-size: 14px; cursor: pointer; width: auto; padding: 6px 10px; border-radius: 6px; font-weight: 600; }
        .edit-btn:hover { background-color: #f59e0b; color: white; }
        .delete-btn { background-color: #fff1f2; color: #f43f5e; border: 1px solid #ffe4e6; font-size: 14px; cursor: pointer; width: auto; padding: 6px 10px; border-radius: 6px; font-weight: 600; }
        .delete-btn:hover { background-color: var(--danger-color); color: white; }
    </style>
</head>
<body>

<div class="container">
    <h1>📅 Trợ Lý Đếm Ngược Siêu Tốc Cloud</h1>
    <div id="syncStatusBox" class="sync-status"></div>

    <div class="form-container">
        <div class="form-group">
            <div>
                <label for="eventTitle">Tên giấy tờ / Sự kiện</label>
                <input type="text" id="eventTitle" placeholder="Ví dụ: Đóng tiền nước, Gia hạn thẻ..." required>
            </div>
            <div>
                <label for="eventDate">Ngày bắt đầu / Lần tới</label>
                <input type="date" id="eventDate" required>
            </div>
            <div>
                <label for="eventCategory">Phân loại</label>
                <select id="eventCategory">
                    <option value="giayto">📄 Giấy tờ</option>
                    <option value="quantrong">⭐ Ngày quan trọng</option>
                </select>
            </div>
            <div>
                <label for="repeatType">Chu kỳ lặp</label>
                <select id="repeatType" onchange="toggleRepeatUnit()">
                    <option value="none">Không lặp</option>
                    <option value="custom">Định kỳ...</option>
                </select>
            </div>
            <div id="customRepeatGroup" style="display: none;">
                <label>Mỗi khoảng (Số + Mốc)</label>
                <div class="repeat-options">
                    <input type="number" id="repeatValue" min="1" value="1">
                    <select id="repeatUnit">
                        <option value="days">Ngày</option>
                        <option value="weeks">Tuần</option>
                        <option value="months" selected>Tháng</option>
                        <option value="years">Năm</option>
                    </select>
                </div>
            </div>
            <div>
                <button class="btn-add" id="submitEventBtn" onclick="handleSubmitEvent()">Thêm</button>
            </div>
        </div>
    </div>

    <div class="toolbar">
        <div class="toolbar-buttons">
            <button class="sync-manual-btn" onclick="fetchFromCloud()">🔄 Đồng bộ dữ liệu</button>
            <button id="notifyBtn" class="sync-manual-btn" onclick="requestNotificationPermission()">🔔 Bật thông báo nhắc hẹn</button>
        </div>
    </div>

    <div class="toolbar filter-toolbar">
        <div class="toolbar-buttons">
            <select id="filterCategory" class="filter-select" onchange="applyFilters()">
                <option value="all">📋 Mọi hạng mục</option>
                <option value="giayto">📄 Giấy tờ</option>
                <option value="quantrong">⭐ Ngày quan trọng</option>
            </select>
            <select id="filterMilestone" class="filter-select" onchange="applyFilters()">
                <option value="all">⏳ Mọi thời hạn</option>
                <option value="30">≤ 30 ngày</option>
                <option value="15">≤ 15 ngày</option>
                <option value="5">≤ 5 ngày</option>
                <option value="1">≤ 1 ngày</option>
                <option value="expired">Đã quá hạn</option>
            </select>
        </div>
        <div class="toolbar-buttons">
            <button id="listViewBtn" class="view-btn active" onclick="switchView('list')">📛 Dạng Dòng</button>
            <button id="gridViewBtn" class="view-btn" onclick="switchView('grid')">🎴 Dạng Thẻ</button>
        </div>
    </div>

    <div class="events-list" id="eventsList"></div>

    <div class="config-footer">
        <button class="config-toggle-btn" id="configToggleBtn" onclick="toggleConfigBox()">
            ⚙️ Cài đặt kết nối Supabase Cloud
        </button>
        <div class="config-container" id="configContainer" style="display:none;">
            <div class="config-grid">
                <div>
                    <label for="sbUrl">Supabase URL</label>
                    <input type="text" id="sbUrl" placeholder="https://xxx.supabase.co">
                </div>
                <div>
                    <label for="sbKey">Supabase Anon Key</label>
                    <input type="text" id="sbKey" placeholder="Chuỗi Anon Key dài...">
                </div>
                <button class="btn-save-config" onclick="saveSupabaseConfig()">Kết Nối Đám Mây</button>
            </div>
        </div>
    </div>
</div>

<script>
    let events = [];
    let currentCategoryFilter = 'all';
    let currentMilestoneFilter = 'all';
    let currentView = localStorage.getItem('countdown_view_pref') || 'list';
    let editModeId = null;
    let supabaseClient = null;

    window.onload = function() {
        updateNotifyBtnUI();
        const savedUrl = localStorage.getItem('sb_url');
        const savedKey = localStorage.getItem('sb_key');
        if(savedUrl && savedKey) {
            document.getElementById('sbUrl').value = savedUrl;
            document.getElementById('sbKey').value = savedKey;
            initSupabase(savedUrl, savedKey);
            fetchFromCloud();
            // Đã từng kết nối -> thu gọn khối cấu hình mặc định
            setConfigBoxVisible(false);
        } else {
            events = JSON.parse(localStorage.getItem('countdown_events_v3')) || [];
            renderEvents();
            // Chưa từng kết nối -> tự mở khối cấu hình để nhắc người dùng
            setConfigBoxVisible(true);
        }
    };

    function setConfigBoxVisible(visible) {
        const box = document.getElementById('configContainer');
        const btn = document.getElementById('configToggleBtn');
        box.style.display = visible ? 'block' : 'none';
        btn.innerText = visible ? '⚙️ Ẩn cài đặt kết nối Supabase' : '⚙️ Cài đặt kết nối Supabase Cloud';
    }

    function toggleConfigBox() {
        const box = document.getElementById('configContainer');
        const isHidden = box.style.display === 'none';
        setConfigBoxVisible(isHidden);
    }

    function initSupabase(url, key) {
        if(url && key) {
            supabaseClient = supabase.createClient(url, key);
        }
    }

    function saveSupabaseConfig() {
        const url = document.getElementById('sbUrl').value.trim();
        const key = document.getElementById('sbKey').value.trim();
        if(!url || !key) { alert('Vui lòng nhập đủ thông tin!'); return; }
        
        localStorage.setItem('sb_url', url);
        localStorage.setItem('sb_key', key);
        initSupabase(url, key);
        alert('Kết nối Supabase Cloud thành công!');
        fetchFromCloud();
        setConfigBoxVisible(false);
    }

    function showSyncStatus(text, className, duration = 3000) {
        const box = document.getElementById('syncStatusBox');
        box.innerText = text;
        box.className = `sync-status ${className}`;
        box.style.display = 'block';
        if(duration > 0) setTimeout(() => { box.style.display = 'none'; }, duration);
    }

    async function fetchFromCloud() {
        if(!supabaseClient) return;
        showSyncStatus("🔄 Đang tải dữ liệu từ Supabase Cloud...", "sync-loading", 0);
        
        try {
            const { data, error } = await supabaseClient.from('events').select('*');
            if (error) throw error;
            
            events = data || [];
            localStorage.setItem('countdown_events_v3', JSON.stringify(events));
            renderEvents();
            showSyncStatus("✅ Đồng bộ đám mây hoàn tất!", "sync-success");
        } catch (err) {
            showSyncStatus("❌ Lỗi đồng bộ: " + err.message, "sync-failed");
        }
    }

    // ==== PHẦN NHẮC NHỞ THEO MỐC 30 / 15 / 5 / 1 NGÀY ====
    const REMINDER_MILESTONES = [30, 15, 5, 1];

    function updateNotifyBtnUI() {
        const btn = document.getElementById('notifyBtn');
        if (!btn) return;
        if ('Notification' in window && Notification.permission === 'granted') {
            btn.innerText = '🔔 Đã bật thông báo';
            btn.classList.add('notify-on');
        } else {
            btn.innerText = '🔔 Bật thông báo nhắc hẹn';
            btn.classList.remove('notify-on');
        }
    }

    function requestNotificationPermission() {
        if (!('Notification' in window)) {
            alert('Trình duyệt của bạn không hỗ trợ thông báo (Notification API).');
            return;
        }
        if (Notification.permission === 'granted') {
            alert('Thông báo đã được bật rồi! App sẽ tự nhắc khi còn 30, 15, 5, 1 ngày tới hạn (mỗi khi bạn mở tab này).');
            return;
        }
        Notification.requestPermission().then(permission => {
            updateNotifyBtnUI();
            if (permission === 'granted') {
                new Notification('🔔 Đã bật nhắc hẹn!', {
                    body: 'Bạn sẽ được nhắc khi sự kiện còn 30, 15, 5 hoặc 1 ngày nữa tới hạn.'
                });
            } else {
                alert('Bạn đã từ chối quyền thông báo. Có thể bật lại trong cài đặt trình duyệt.');
            }
        });
    }

    function getNotifiedLog() {
        return JSON.parse(localStorage.getItem('countdown_notified_log') || '{}');
    }

    function saveNotifiedLog(log) {
        localStorage.setItem('countdown_notified_log', JSON.stringify(log));
    }

    // Kiểm tra từng sự kiện đã tính toán (có daysLeft, computedTargetDate) và bắn thông báo
    // nếu daysLeft trùng mốc 30/15/5/1 và chưa nhắc cho lần đến hạn này.
    function checkAndNotifyReminders(processedEvents) {
        if (!('Notification' in window) || Notification.permission !== 'granted') return;

        const log = getNotifiedLog();
        let changed = false;

        processedEvents.forEach(event => {
            if (!REMINDER_MILESTONES.includes(event.daysLeft)) return;

            // Khóa nhắc nhở gắn với: id sự kiện + ngày đến hạn cụ thể (để sự kiện lặp lại vẫn được nhắc lại ở chu kỳ sau)
            const occurrenceKey = `${event.id}_${event.computedTargetDate.toISOString().slice(0,10)}`;
            const notifiedMilestones = log[occurrenceKey] || [];

            if (!notifiedMilestones.includes(event.daysLeft)) {
                const categoryText = event.category === 'giayto' ? 'Giấy tờ' : 'Ngày quan trọng';
                new Notification(`⏰ Còn ${event.daysLeft} ngày: ${event.title}`, {
                    body: `${categoryText} — hạn tới: ${event.computedTargetDate.toLocaleDateString('vi-VN')}`,
                    tag: occurrenceKey + '_' + event.daysLeft
                });
                notifiedMilestones.push(event.daysLeft);
                log[occurrenceKey] = notifiedMilestones;
                changed = true;
            }
        });

        if (changed) saveNotifiedLog(log);
    }

    function toggleRepeatUnit() {
        const repeatType = document.getElementById('repeatType').value;
        document.getElementById('customRepeatGroup').style.display = repeatType === 'custom' ? 'block' : 'none';
    }

    function switchView(viewType) {
        currentView = viewType;
        localStorage.setItem('countdown_view_pref', viewType);
        const listElement = document.getElementById('eventsList');
        if (viewType === 'grid') {
            listElement.classList.add('grid-view');
            document.getElementById('gridViewBtn').classList.add('active');
            document.getElementById('listViewBtn').classList.remove('active');
        } else {
            listElement.classList.remove('grid-view');
            document.getElementById('listViewBtn').classList.add('active');
            document.getElementById('gridViewBtn').classList.remove('active');
        }
    }

    function handleSubmitEvent() {
        if (editModeId !== null) updateEvent(); else addEvent();
    }

    // Sinh ID cục bộ an toàn khi KHÔNG dùng Supabase (không còn dùng Date.now() để tránh trùng lặp)
    function generateLocalId() {
        if (window.crypto && crypto.randomUUID) return crypto.randomUUID();
        return 'local-' + Date.now() + '-' + Math.random().toString(16).slice(2);
    }

    async function addEvent() {
        const title = document.getElementById('eventTitle').value.trim();
        const date = document.getElementById('eventDate').value;
        const category = document.getElementById('eventCategory').value;
        const repeatType = document.getElementById('repeatType').value;
        
        let repeatValue = 0, repeatUnit = 'none';
        if (repeatType === 'custom') {
            repeatValue = parseInt(document.getElementById('repeatValue').value) || 1;
            repeatUnit = document.getElementById('repeatUnit').value;
        }

        if (!title || !date) { alert('Vui lòng điền đầy đủ thông tin!'); return; }

        const newEventPayload = { title, date, category, repeatValue, repeatUnit };

        if (supabaseClient) {
            // KHÔNG tự gán id ở client nữa: để Supabase tự sinh (thường là UUID)
            // rồi lấy lại bản ghi vừa tạo (kèm id thật) để hiển thị đúng.
            const { data, error } = await supabaseClient
                .from('events')
                .insert([newEventPayload])
                .select();
            if (error) {
                alert('Lỗi đẩy dữ liệu lên Cloud: ' + error.message);
                return;
            }
            const savedEvent = (data && data[0]) ? data[0] : { ...newEventPayload, id: generateLocalId() };
            events.push(savedEvent);
        } else {
            // Không có Supabase: lưu local với ID tự sinh an toàn
            events.push({ ...newEventPayload, id: generateLocalId() });
            localStorage.setItem('countdown_events_v3', JSON.stringify(events));
        }

        renderEvents();
        resetForm();
    }

    function startEditEvent(id) {
        // So sánh theo chuỗi để hoạt động đúng với cả ID số (local) lẫn UUID (Supabase)
        const target = events.find(e => String(e.id) === String(id));
        if(!target) return;

        editModeId = id;
        document.getElementById('eventTitle').value = target.title;
        document.getElementById('eventDate').value = target.date;
        document.getElementById('eventCategory').value = target.category;

        if (target.repeatUnit && target.repeatUnit !== 'none') {
            document.getElementById('repeatType').value = 'custom';
            document.getElementById('repeatValue').value = target.repeatValue;
            document.getElementById('repeatUnit').value = target.repeatUnit;
        } else {
            document.getElementById('repeatType').value = 'none';
        }

        toggleRepeatUnit();
        const submitBtn = document.getElementById('submitEventBtn');
        submitBtn.innerText = "Cập nhật";
        submitBtn.classList.add('btn-update-mode');
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    async function updateEvent() {
        const title = document.getElementById('eventTitle').value.trim();
        const date = document.getElementById('eventDate').value;
        const category = document.getElementById('eventCategory').value;
        const repeatType = document.getElementById('repeatType').value;

        let repeatValue = 0, repeatUnit = 'none';
        if (repeatType === 'custom') {
            repeatValue = parseInt(document.getElementById('repeatValue').value) || 1;
            repeatUnit = document.getElementById('repeatUnit').value;
        }

        events = events.map(e => {
            if(String(e.id) === String(editModeId)) {
                return { ...e, title, date, category, repeatValue, repeatUnit };
            }
            return e;
        });
        renderEvents();

        if(supabaseClient) {
            const { error } = await supabaseClient.from('events')
                .update({ title, date, category, repeatValue, repeatUnit })
                .eq('id', editModeId);
            if(error) alert('Lỗi cập nhật Cloud: ' + error.message);
        } else {
            localStorage.setItem('countdown_events_v3', JSON.stringify(events));
        }
        resetForm();
    }

    function resetForm() {
        editModeId = null;
        document.getElementById('eventTitle').value = '';
        document.getElementById('eventDate').value = '';
        document.getElementById('repeatType').value = 'none';
        toggleRepeatUnit();
        const submitBtn = document.getElementById('submitEventBtn');
        submitBtn.innerText = "Thêm";
        submitBtn.classList.remove('btn-update-mode');
    }

    async function deleteEvent(id) {
        if(confirm('Bạn có chắc muốn xóa mục này?')) {
            events = events.filter(event => String(event.id) !== String(id));
            renderEvents();

            if(supabaseClient) {
                const { error } = await supabaseClient.from('events').delete().eq('id', id);
                if(error) alert('Lỗi xóa trên Cloud: ' + error.message);
            } else {
                localStorage.setItem('countdown_events_v3', JSON.stringify(events));
            }
            if (String(editModeId) === String(id)) resetForm();
        }
    }

    function getNextOccurrence(startDateStr, repeatValue, repeatUnit, today) {
        if (!startDateStr) return new Date();
        let targetDate = new Date(startDateStr);
        if (isNaN(targetDate.getTime())) return new Date();
        
        targetDate.setHours(0,0,0,0);
        if (repeatUnit === 'none' || targetDate >= today) return targetDate;

        while (targetDate < today) {
            if (repeatUnit === 'days') targetDate.setDate(targetDate.getDate() + repeatValue);
            else if (repeatUnit === 'weeks') targetDate.setDate(targetDate.getDate() + (repeatValue * 7));
            else if (repeatUnit === 'months') targetDate.setMonth(targetDate.getMonth() + repeatValue);
            else if (repeatUnit === 'years') targetDate.setFullYear(targetDate.getFullYear() + repeatValue);
        }
        return targetDate;
    }

    function applyFilters() {
        currentCategoryFilter = document.getElementById('filterCategory').value;
        currentMilestoneFilter = document.getElementById('filterMilestone').value;
        renderEvents();
    }

    function matchesMilestoneFilter(daysLeft, filterValue) {
        if (filterValue === 'all') return true;
        if (filterValue === 'expired') return daysLeft < 0;
        const threshold = parseInt(filterValue, 10);
        return daysLeft >= 0 && daysLeft <= threshold;
    }

    function renderEvents() {
        const listElement = document.getElementById('eventsList');
        listElement.innerHTML = '';
        if (events.length === 0) {
            listElement.innerHTML = '<p style="text-align:center; color:#64748b; padding: 30px;">Chưa có sự kiện nào.</p>';
            return;
        }

        const today = new Date();
        today.setHours(0,0,0,0);

        const processedEvents = events.map(event => {
            const computedTargetDate = getNextOccurrence(event.date, event.repeatValue, event.repeatUnit, today);
            const timeDiff = computedTargetDate.getTime() - today.getTime();
            const daysLeft = Math.ceil(timeDiff / (1000 * 3600 * 24));
            return { ...event, computedTargetDate, daysLeft };
        });

        // Luôn kiểm tra nhắc nhở trên TOÀN BỘ sự kiện, không phụ thuộc bộ lọc đang chọn
        checkAndNotifyReminders(processedEvents);

        // Áp dụng bộ lọc hạng mục + mốc hạn cho phần hiển thị
        const filteredEvents = processedEvents.filter(event => {
            const categoryOk = currentCategoryFilter === 'all' || event.category === currentCategoryFilter;
            const milestoneOk = matchesMilestoneFilter(event.daysLeft, currentMilestoneFilter);
            return categoryOk && milestoneOk;
        });

        filteredEvents.sort((a, b) => a.daysLeft - b.daysLeft);

        if (filteredEvents.length === 0) {
            listElement.innerHTML = '<p style="text-align:center; color:#64748b; padding: 30px;">Không có sự kiện nào khớp với bộ lọc đang chọn.</p>';
            switchView(currentView);
            return;
        }

        filteredEvents.forEach(event => {
            let statusClass = 'safe';
            let statusText = `Còn ${event.daysLeft} ngày`;

            if (event.daysLeft === 0) { statusClass = 'urgent'; statusText = `HÔM NAY! 🎉`; }
            else if (event.daysLeft < 0) { statusClass = 'expired'; statusText = `Đã qua ${Math.abs(event.daysLeft)} ngày`; }
            else if (event.daysLeft <= 7) { statusClass = 'urgent'; }
            else if (event.daysLeft <= 30) { statusClass = 'warning'; }

            const formattedDate = event.computedTargetDate.toLocaleDateString('vi-VN');
            const categoryText = event.category === 'giayto' ? '📄 Giấy tờ' : '⭐ Sự kiện';
            
            let repeatText = '';
            if (event.repeatUnit !== 'none') {
                const unitMap = { days: 'Ngày', weeks: 'Tuần', months: 'Tháng', years: 'Năm' };
                repeatText = `<span class="repeat-badge">🔁 Mỗi ${event.repeatValue} ${unitMap[event.repeatUnit]}</span>`;
            }

            let reminderText = '';
            if (REMINDER_MILESTONES.includes(event.daysLeft)) {
                reminderText = `<span class="reminder-badge">⏰ Mốc nhắc ${event.daysLeft} ngày</span>`;
            }

            const card = document.createElement('div');
            card.className = `event-card ${statusClass} cat-${event.category}`;

            // Dùng data-id + addEventListener thay vì nhúng trực tiếp id vào chuỗi onclick,
            // để tránh vỡ cú pháp khi id là UUID (có ký tự "-")
            card.innerHTML = `
                <div class="event-info">
                    <h3></h3>
                    <p style="font-weight: 600; color: #475569; margin-bottom: 4px;">${categoryText}</p>
                    <p>Hạn tới: <b>${formattedDate}</b></p>
                    ${repeatText}
                    ${reminderText}
                </div>
                <div class="countdown-display">
                    <span class="days-left">${statusText}</span>
                    <div class="action-btns">
                        <button class="edit-btn" data-id="${event.id}">✏️ Sửa</button>
                        <button class="delete-btn" data-id="${event.id}">🗑️ Xóa</button>
                    </div>
                </div>
            `;
            // Gán tên sự kiện bằng textContent để tránh lỗi XSS nếu tiêu đề chứa ký tự đặc biệt (<, >, ")
            card.querySelector('.event-info h3').textContent = event.title;

            card.querySelector('.edit-btn').addEventListener('click', () => startEditEvent(event.id));
            card.querySelector('.delete-btn').addEventListener('click', () => deleteEvent(event.id));

            listElement.appendChild(card);
        });
        switchView(currentView);
    }
</script>
</body>
</html>
