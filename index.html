<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trợ Lý Đếm Ngược</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #4f46e5, #3b82f6);
            --danger-color: #ef4444;
            --warning-color: #f59e0b;
            --success-color: #10b981;
            --bg-gradient: linear-gradient(135deg, #f0fdf4 0%, #e0f2fe 100%);
            --card-bg: #ffffff;
            --text-main: #1e293b;
        }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg-gradient); min-height: 100vh; margin: 0; padding: 30px 20px; color: var(--text-main); }
        .container { max-width: 1000px; margin: 0 auto; }
        h1 { text-align: center; color: #1e3a8a; font-size: 2.2rem; margin-bottom: 25px; }
        
        .sync-status { text-align: center; font-size: 13px; font-weight: bold; margin-bottom: 15px; padding: 6px; border-radius: 20px; display: none; }
        .sync-loading { background: #fef3c7; color: #d97706; }

        /* Toast notification */
        #toastContainer { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 9999; display: flex; flex-direction: column; gap: 8px; align-items: center; pointer-events: none; }
        .toast { display: flex; align-items: center; gap: 8px; background: #ffffff; border-left: 4px solid var(--success-color); color: var(--text-main); padding: 12px 18px; border-radius: 10px; box-shadow: 0 6px 20px rgba(0,0,0,0.15); font-size: 14px; font-weight: 600; opacity: 0; transform: translateY(-15px); transition: opacity 0.25s ease, transform 0.25s ease; max-width: 90vw; }
        .toast.toast-show { opacity: 1; transform: translateY(0); }
        .toast.toast-error { border-left-color: var(--danger-color); }
        .toast .toast-icon { flex-shrink: 0; width: 20px; height: 20px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-size: 13px; background: var(--success-color); }
        .toast.toast-error .toast-icon { background: var(--danger-color); }

        /* Highlight vừa thêm/sửa - chỉ chạy khi thẻ lọt vào tầm nhìn lúc cuộn tới */
        @keyframes newEventPulse {
            0% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.55); }
            70% { box-shadow: 0 0 0 12px rgba(16, 185, 129, 0); }
            100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
        }
        .event-card.just-added.in-view { animation: newEventPulse 1.4s ease-out 2; }
        .sync-success { background: #d1fae5; color: #065f46; }
        .sync-failed { background: #fee2e2; color: #b91c1c; }

        /* Khung nhập URL & KEY của Supabase - phiên bản gọn, đặt cuối trang */
        .config-footer {
            margin-top: 30px;
            text-align: center;
        }
        .config-toggle-btn {
            width: auto;
            display: inline-block;
            background: none;
            border: 1px dashed #cbd5e1;
            color: #64748b;
            font-size: 13px;
            font-weight: 600;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
        }
        .config-toggle-btn:hover { background-color: #f1f5f9; color: #334155; }
        .config-container {
            background: #f1f5f9;
            border: 1px solid #cbd5e1;
            padding: 15px;
            border-radius: 12px;
            margin-top: 12px;
            text-align: left;
            box-shadow: 0 4px 10px rgba(0,0,0,0.02);
        }
        .config-grid {
            display: grid;
            grid-template-columns: 1fr 2fr auto;
            gap: 10px;
            align-items: end;
        }
        @media (max-width: 768px) { .config-grid { grid-template-columns: 1fr; } }
        
        .btn-save-config { background: #0f172a; color: white; border: none; font-weight: bold; cursor: pointer; height: 45px;}

        .form-container { background-color: var(--card-bg); padding: 25px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); margin-bottom: 30px; }
        .form-group { display: flex; flex-wrap: wrap; gap: 15px; align-items: end; }
        .form-group > div { flex: 1 1 160px; min-width: 140px; }
        .form-group > div:first-child { flex: 2 1 220px; }
        .form-group > div:last-child { flex: 0 0 auto; min-width: 100px; }
        .repeat-options { display: flex; gap: 5px; }
        .repeat-options input { width: 60px; text-align: center; }
        @media (max-width: 950px) { .form-group > div { flex: 1 1 100%; } }
        
        label { font-weight: 600; font-size: 14px; margin-bottom: 8px; display: block; color: #475569; }
        input, select, button { width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 8px; box-sizing: border-box; font-size: 14px; transition: all 0.3s ease; }
        
        button.btn-add { background: var(--primary-gradient); color: white; border: none; cursor: pointer; font-weight: bold; }
        button.btn-update-mode { background: linear-gradient(135deg, #f59e0b, #d97706); }
        
        .toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; flex-wrap: wrap; gap: 10px; }
        .toolbar-buttons { display: flex; gap: 10px; flex-wrap: wrap; }
        .view-btn, .sync-manual-btn { width: auto; padding: 8px 16px; background-color: #e2e8f0; color: #475569; border: none; font-weight: 600; border-radius: 6px; cursor: pointer; }
        .view-btn.active { background: var(--primary-gradient); color: white; }

        /* Nhóm nút chuyển dạng hiển thị theo icon (list / grid / compact) */
        .view-toggle-group {
            display: inline-flex;
            background: #e2e8f0;
            border-radius: 8px;
            padding: 3px;
            gap: 2px;
        }
        .view-toggle-group .view-btn {
            background: transparent;
            color: #64748b;
            padding: 7px 11px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .view-toggle-group .view-btn.active { background: var(--primary-gradient); color: white; }
        .view-toggle-group .view-btn:hover:not(.active) { background: #cbd5e1; }
        .sync-manual-btn.notify-on { background-color: #d1fae5; color: #065f46; }
        .filter-toolbar { margin-bottom: 20px; }
        .filter-select {
            width: auto;
            padding: 8px 14px;
            background-color: #e2e8f0;
            color: #334155;
            border: none;
            font-weight: 600;
            font-size: 13px;
            border-radius: 6px;
            cursor: pointer;
        }
        .filter-select:focus { outline: 2px solid #3b82f6; }

        .reminder-badge { display: inline-block; background-color: #fff7ed; color: #c2410c; padding: 4px 10px; border-radius: 6px; font-size: 11px; font-weight: 600; margin-top: 8px; margin-left: 6px; border: 1px solid #fed7aa; }
        
        .events-list { display: grid; gap: 15px; }
        .events-list.grid-view { grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); }

        /* Dạng Tối giản: hàng thấp, ẩn chi tiết phụ, ưu tiên hiện nhiều mục trên màn hình */
        .events-list.compact-view { gap: 6px; }
        .events-list.compact-view .event-card {
            padding: 8px 14px;
            border-left-width: 4px;
            min-height: unset;
        }
        .events-list.compact-view .event-info h3 {
            font-size: 14px;
            margin: 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .events-list.compact-view .event-info p,
        .events-list.compact-view .repeat-badge,
        .events-list.compact-view .reminder-badge {
            display: none;
        }
        .events-list.compact-view .countdown-display { gap: 8px; }
        .events-list.compact-view .days-left { font-size: 13px; white-space: nowrap; }
        .events-list.compact-view .complete-btn,
        .events-list.compact-view .edit-btn,
        .events-list.compact-view .delete-btn { padding: 5px 8px; }
        .events-list.compact-view .btn-label { display: none; }
        .events-list.compact-view .event-card::after { width: 44px; height: 44px; right: 2px; bottom: 2px; }
        .event-card { background-color: var(--card-bg); padding: 20px; border-radius: 14px; box-shadow: 0 4px 10px rgba(0,0,0,0.02); display: flex; justify-content: space-between; align-items: center; border-left: 6px solid #3b82f6; position: relative; overflow: hidden; }
        .events-list.grid-view .event-card { flex-direction: column; align-items: flex-start; justify-content: space-between; min-height: 160px; border-left: none; border-top: 6px solid #3b82f6; }

        /* Hình nền mặc định theo hạng mục */
        .event-card.cat-giayto { background: linear-gradient(135deg, #e0f2fe 0%, #bae6fd 100%); }
        .event-card.cat-quantrong { background: linear-gradient(135deg, #fee2e2 0%, #fecaca 100%); }
        .event-card.cat-baoduong { background: linear-gradient(135deg, #dcfce7 0%, #86efac 100%); }
        .event-card.cat-hoadon { background: linear-gradient(135deg, #ede9fe 0%, #c4b5fd 100%); }
        .event-card.cat-suckhoe { background: linear-gradient(135deg, #ffe4e6 0%, #fda4af 100%); }
        .event-card.cat-khac { background: linear-gradient(135deg, #f5f5f4 0%, #d6d3d1 100%); }

        .event-card.cat-giayto::after,
        .event-card.cat-quantrong::after,
        .event-card.cat-baoduong::after,
        .event-card.cat-hoadon::after,
        .event-card.cat-suckhoe::after,
        .event-card.cat-khac::after {
            content: "";
            position: absolute;
            right: -14px;
            bottom: 12px;
            width: 150px;
            height: 150px;
            background-repeat: no-repeat;
            background-size: contain;
            background-position: bottom right;
            opacity: 0.4;
            transform: rotate(-12deg);
            pointer-events: none;
            z-index: 0;
        }
        .events-list.grid-view .event-card.cat-giayto::after,
        .events-list.grid-view .event-card.cat-quantrong::after,
        .events-list.grid-view .event-card.cat-baoduong::after,
        .events-list.grid-view .event-card.cat-hoadon::after,
        .events-list.grid-view .event-card.cat-suckhoe::after,
        .events-list.grid-view .event-card.cat-khac::after {
            width: 130px;
            height: 130px;
        }

            background-image: url("data:image/svg+xml;base64,PHN2ZyB4bWxucz0naHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmcnIHZpZXdCb3g9JzAgMCAyNCAyNCc+PHBhdGggZmlsbD0nIzFlNDBhZicgZD0nTTYgMmg4bDUgNXYxNWExIDEgMCAwIDEtMSAxSDZhMSAxIDAgMCAxLTEtMVYzYTEgMSAwIDAgMSAxLTF6JyBvcGFjaXR5PScwLjknLz48cGF0aCBmaWxsPScjOTNjNWZkJyBkPSdNMTQgMnY1aDV6Jy8+PHJlY3QgeD0nOCcgeT0nMTIuNScgd2lkdGg9JzgnIGhlaWdodD0nMS40JyByeD0nMC43JyBmaWxsPSd3aGl0ZScvPjxyZWN0IHg9JzgnIHk9JzE2JyB3aWR0aD0nOCcgaGVpZ2h0PScxLjQnIHJ4PScwLjcnIGZpbGw9J3doaXRlJy8+PHJlY3QgeD0nOCcgeT0nOScgd2lkdGg9JzQnIGhlaWdodD0nMS40JyByeD0nMC43JyBmaWxsPSd3aGl0ZScvPjwvc3ZnPg==");
        }

        }
        .event-card.cat-baoduong::after {
            background-image: url("data:image/svg+xml;base64,PHN2ZyB4bWxucz0naHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmcnIHZpZXdCb3g9JzAgMCAyNCAyNCc+PGcgdHJhbnNmb3JtPSdyb3RhdGUoNDUgMTIgMTIpJz48cmVjdCB4PScxMC4zJyB5PScxLjUnIHdpZHRoPSczLjQnIGhlaWdodD0nMjEnIHJ4PScxLjcnIGZpbGw9JyMxNTgwM2QnIG9wYWNpdHk9JzAuOScvPjxjaXJjbGUgY3g9JzEyJyBjeT0nNCcgcj0nMy40JyBmaWxsPSdub25lJyBzdHJva2U9JyMxNTgwM2QnIHN0cm9rZS13aWR0aD0nMi4yJy8+PGNpcmNsZSBjeD0nMTInIGN5PScyMCcgcj0nMy40JyBmaWxsPSdub25lJyBzdHJva2U9JyMxNTgwM2QnIHN0cm9rZS13aWR0aD0nMi4yJy8+PC9nPjwvc3ZnPg==");
        }
        .event-card.cat-hoadon::after {
            background-image: url("data:image/svg+xml;base64,PHN2ZyB4bWxucz0naHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmcnIHZpZXdCb3g9JzAgMCAyNCAyNCc+PHBhdGggZmlsbD0nIzZkMjhkOScgb3BhY2l0eT0nMC45JyBkPSdNNSAyaDE0djE4LjVsLTItMS4zLTIgMS4zLTItMS4zLTIgMS4zLTItMS4zLTIgMS4zLTItMS4zeicvPjxyZWN0IHg9JzcuNScgeT0nNicgd2lkdGg9JzknIGhlaWdodD0nMS40JyByeD0nMC43JyBmaWxsPSd3aGl0ZScvPjxyZWN0IHg9JzcuNScgeT0nOS41JyB3aWR0aD0nOScgaGVpZ2h0PScxLjQnIHJ4PScwLjcnIGZpbGw9J3doaXRlJy8+PHJlY3QgeD0nNy41JyB5PScxMycgd2lkdGg9JzYnIGhlaWdodD0nMS40JyByeD0nMC43JyBmaWxsPSd3aGl0ZScvPjwvc3ZnPg==");
        }
        .event-card.cat-suckhoe::after {
            background-image: url("data:image/svg+xml;base64,PHN2ZyB4bWxucz0naHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmcnIHZpZXdCb3g9JzAgMCAyNCAyNCc+PHBhdGggZmlsbD0nI2JlMTIzYycgb3BhY2l0eT0nMC45JyBkPSdNMTIgMjFzLTcuNS00LjYtMTAtOS4zQzAuMyA4LjQgMS44IDQuOCA1LjIgNGMyLTAuNSAzLjkgMC4zIDUgMS45IDEuMS0xLjYgMy0yLjQgNS0xLjkgMy40IDAuOCA0LjkgNC40IDMuMiA3LjdDMTkuNSAxNi40IDEyIDIxIDEyIDIxeicvPjxwb2x5bGluZSBwb2ludHM9JzUgMTIgOSAxMiAxMC41IDguNSAxMyAxNSAxNC41IDEyIDE5IDEyJyBmaWxsPSdub25lJyBzdHJva2U9J3doaXRlJyBzdHJva2Utd2lkdGg9JzEuMicgc3Ryb2tlLWxpbmVjYXA9J3JvdW5kJyBzdHJva2UtbGluZWpvaW49J3JvdW5kJy8+PC9zdmc+");
        }
        .event-card.cat-khac::after {
            background-image: url("data:image/svg+xml;base64,PHN2ZyB4bWxucz0naHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmcnIHZpZXdCb3g9JzAgMCAyNCAyNCc+PHBhdGggZmlsbD0nIzU3NTM0ZScgb3BhY2l0eT0nMC45JyBkPSdNMjAgMTIuNCAxMi42IDE5LjhhMiAyIDAgMCAxLTIuOCAwbC02LjYtNi42YTIgMiAwIDAgMS0wLjYtMS40VjQuNmEyIDIgMCAwIDEgMi0yaDcuMmEyIDIgMCAwIDEgMS40IDAuNmw2LjYgNi42YTIgMiAwIDAgMSAwIDIuOHonLz48Y2lyY2xlIGN4PSc4JyBjeT0nOCcgcj0nMS42JyBmaWxsPSd3aGl0ZScvPjwvc3ZnPg==");
        }

        .event-card .event-info,
        .event-card .countdown-display {
            position: relative;
            z-index: 1;
        }
        
        .event-card.urgent { border-left-color: var(--danger-color); }
        .event-card.warning { border-left-color: var(--warning-color); }
        .event-card.safe { border-left-color: var(--success-color); }
        .event-card.expired { border-left-color: #94a3b8; opacity: 0.7; }
        
        .events-list.grid-view .event-card.urgent { border-top-color: var(--danger-color); }
        .events-list.grid-view .event-card.warning { border-top-color: var(--warning-color); }
        .events-list.grid-view .event-card.safe { border-top-color: var(--success-color); }
        .events-list.grid-view .event-card.expired { border-top-color: #94a3b8; }
        
        .event-info h3 { margin: 0 0 8px 0; color: #0f172a; font-size: 1.1rem; }
        .event-info p { margin: 0; font-size: 13px; color: #64748b; }
        .repeat-badge { display: inline-block; background-color: #f0fdf4; color: #166534; padding: 4px 10px; border-radius: 6px; font-size: 11px; font-weight: 600; margin-top: 8px; border: 1px solid #bbf7d0; }
        .tag-chip { display: inline-block; background-color: #f1f5f9; color: #475569; padding: 3px 9px; border-radius: 999px; font-size: 11px; font-weight: 600; margin-top: 8px; margin-right: 5px; border: 1px solid #e2e8f0; }
        .events-list.compact-view .tag-chip { display: none; }
        
        .countdown-display { text-align: right; display: flex; align-items: center; gap: 15px; }
        .events-list.grid-view .countdown-display { width: 100%; justify-content: space-between; margin-top: 15px; padding-top: 10px; border-top: 1px dashed #e2e8f0; }
        .days-left { font-size: 18px; font-weight: 700; }
        
        .urgent .days-left { color: var(--danger-color); }
        .warning .days-left { color: var(--warning-color); }
        .safe .days-left { color: var(--success-color); }
        
        .action-btns { display: flex; gap: 6px; }
        .edit-btn { background-color: #fef3c7; color: #d97706; border: 1px solid #fde68a; font-size: 14px; cursor: pointer; width: auto; padding: 6px 10px; border-radius: 6px; font-weight: 600; }
        .edit-btn:hover { background-color: #f59e0b; color: white; }
        .delete-btn { background-color: #fff1f2; color: #f43f5e; border: 1px solid #ffe4e6; font-size: 14px; cursor: pointer; width: auto; padding: 6px 10px; border-radius: 6px; font-weight: 600; }
        .delete-btn:hover { background-color: var(--danger-color); color: white; }
        .complete-btn { background-color: #ecfdf5; color: #059669; border: 1px solid #a7f3d0; font-size: 14px; cursor: pointer; width: auto; padding: 6px 10px; border-radius: 6px; font-weight: 600; }
        .complete-btn:hover { background-color: var(--success-color); color: white; }

        /* Nút Lưu trữ ở toolbar */
        .archive-btn-wrapper { position: relative; display: inline-block; }
        .archive-badge { position: absolute; top: -6px; right: -6px; background: var(--danger-color); color: white; font-size: 10px; font-weight: 700; padding: 1px 5px; border-radius: 999px; min-width: 16px; text-align: center; line-height: 1.4; }

        /* Modal Lưu trữ */
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(15, 23, 42, 0.55); z-index: 1000; align-items: center; justify-content: center; padding: 20px; }
        .modal-overlay.open { display: flex; }
        .modal-box { background: white; border-radius: 14px; width: 100%; max-width: 560px; max-height: 80vh; display: flex; flex-direction: column; box-shadow: 0 20px 50px rgba(0,0,0,0.3); }
        .modal-header { display: flex; justify-content: space-between; align-items: center; padding: 16px 20px; border-bottom: 1px solid #e2e8f0; }
        .modal-header h2 { font-size: 17px; margin: 0; }
        .modal-close-btn { background: none; border: none; font-size: 20px; cursor: pointer; color: #64748b; line-height: 1; padding: 4px; }
        .modal-close-btn:hover { color: #1e293b; }
        .modal-body { padding: 12px 20px; overflow-y: auto; }
        .archive-item { display: flex; justify-content: space-between; align-items: center; gap: 10px; padding: 12px 0; border-bottom: 1px solid #f1f5f9; }
        .archive-item:last-child { border-bottom: none; }
        .archive-item-info h4 { margin: 0 0 4px 0; font-size: 14px; }
        .archive-item-info p { margin: 0; font-size: 12px; color: #64748b; }
        .archive-item-actions { display: flex; gap: 6px; flex-shrink: 0; }
        .restore-btn { background-color: #eff6ff; color: #2563eb; border: 1px solid #bfdbfe; font-size: 13px; cursor: pointer; padding: 6px 10px; border-radius: 6px; font-weight: 600; }
        .restore-btn:hover { background-color: #2563eb; color: white; }
    </style>
</head>
<body>

<div id="toastContainer"></div>

<div class="container">
    <h1>📅 Trợ Lý Đếm Ngược</h1>
    <div id="syncStatusBox" class="sync-status"></div>

    <div class="form-container">
        <div class="form-group">
            <div>
                <label for="eventTitle">Tên giấy tờ / Sự kiện</label>
                <input type="text" id="eventTitle" placeholder="Ví dụ: Đóng tiền nước, Gia hạn thẻ..." required>
            </div>
            <div>
                <label for="eventDate">Ngày bắt đầu / Lần tới</label>
                <input type="date" id="eventDate" required>
            </div>
            <div>
                <label for="eventCategory">Phân loại</label>
                <select id="eventCategory">
                    <option value="giayto">📄 Giấy tờ</option>
                    <option value="quantrong">⭐ Ngày quan trọng</option>
                    <option value="baoduong">🔧 Bảo hành/Bảo dưỡng</option>
                    <option value="hoadon">🧾 Hóa đơn</option>
                    <option value="suckhoe">❤️ Sức khỏe</option>
                    <option value="khac">🏷️ Khác</option>
                </select>
            </div>
            <div>
                <label for="repeatType">Chu kỳ lặp</label>
                <select id="repeatType" onchange="toggleRepeatUnit()">
                    <option value="none">Không lặp</option>
                    <option value="custom">Định kỳ...</option>
                </select>
            </div>
            <div id="customRepeatGroup" style="display: none;">
                <label>Mỗi khoảng (Số + Mốc)</label>
                <div class="repeat-options">
                    <input type="number" id="repeatValue" min="1" value="1">
                    <select id="repeatUnit">
                        <option value="days">Ngày</option>
                        <option value="weeks">Tuần</option>
                        <option value="months" selected>Tháng</option>
                        <option value="years">Năm</option>
                    </select>
                </div>
            </div>
            <div style="flex: 1 1 100%;">
                <label for="eventTags">Tag (tuỳ chọn, cách nhau bằng dấu phẩy)</label>
                <input type="text" id="eventTags" placeholder="Ví dụ: xe máy, Ba, xe hơi...">
            </div>
            <div>
                <button class="btn-add" id="submitEventBtn" onclick="handleSubmitEvent()">Thêm</button>
            </div>
        </div>
    </div>

    <div class="toolbar">
        <div class="toolbar-buttons">
            <button class="sync-manual-btn" onclick="fetchFromCloud()">🔄 Đồng bộ dữ liệu</button>
            <button id="notifyBtn" class="sync-manual-btn" onclick="requestNotificationPermission()">🔔 Bật thông báo nhắc hẹn</button>
            <span class="archive-btn-wrapper">
                <button class="sync-manual-btn" onclick="openArchive()">📦 Lưu trữ</button>
                <span id="archiveBadge" class="archive-badge" style="display:none;">0</span>
            </span>
        </div>
    </div>

    <div class="toolbar filter-toolbar">
        <div class="toolbar-buttons">
            <select id="filterCategory" class="filter-select" onchange="applyFilters()">
                <option value="all">📋 Mọi hạng mục</option>
                <option value="giayto">📄 Giấy tờ</option>
                <option value="quantrong">⭐ Ngày quan trọng</option>
                <option value="baoduong">🔧 Bảo hành/Bảo dưỡng</option>
                <option value="hoadon">🧾 Hóa đơn</option>
                <option value="suckhoe">❤️ Sức khỏe</option>
                <option value="khac">🏷️ Khác</option>
            </select>
            <select id="filterMilestone" class="filter-select" onchange="applyFilters()">
                <option value="all">⏳ Mọi thời hạn</option>
                <option value="30">≤ 30 ngày</option>
                <option value="15">≤ 15 ngày</option>
                <option value="5">≤ 5 ngày</option>
                <option value="1">≤ 1 ngày</option>
                <option value="expired">Đã quá hạn</option>
            </select>
        </div>
        <div class="toolbar-buttons">
            <div class="view-toggle-group">
                <button id="listViewBtn" class="view-btn active" onclick="switchView('list')" title="Dạng Dòng">
                    <svg viewBox="0 0 24 24" width="19" height="19" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"><line x1="4" y1="8" x2="20" y2="8"/><line x1="4" y1="16" x2="20" y2="16"/></svg>
                </button>
                <button id="gridViewBtn" class="view-btn" onclick="switchView('grid')" title="Dạng Thẻ">
                    <svg viewBox="0 0 24 24" width="19" height="19" fill="none" stroke="currentColor" stroke-width="2"><rect x="4" y="4" width="7" height="7" rx="1.5"/><rect x="13" y="4" width="7" height="7" rx="1.5"/><rect x="4" y="13" width="7" height="7" rx="1.5"/><rect x="13" y="13" width="7" height="7" rx="1.5"/></svg>
                </button>
                <button id="compactViewBtn" class="view-btn" onclick="switchView('compact')" title="Dạng Tối Giản">
                    <svg viewBox="0 0 24 24" width="19" height="19" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="4" y1="5" x2="20" y2="5"/><line x1="4" y1="9.5" x2="20" y2="9.5"/><line x1="4" y1="14" x2="20" y2="14"/><line x1="4" y1="18.5" x2="20" y2="18.5"/></svg>
                </button>
            </div>
        </div>
    </div>

    <div class="events-list" id="eventsList"></div>

    <div class="config-footer">
        <button class="config-toggle-btn" id="configToggleBtn" onclick="toggleConfigBox()">
            ⚙️ Cài đặt kết nối Supabase Cloud
        </button>
        <div class="config-container" id="configContainer" style="display:none;">
            <div class="config-grid">
                <div>
                    <label for="sbUrl">Supabase URL</label>
                    <input type="text" id="sbUrl" placeholder="https://xxx.supabase.co">
                </div>
                <div>
                    <label for="sbKey">Supabase Anon Key</label>
                    <input type="text" id="sbKey" placeholder="Chuỗi Anon Key dài...">
                </div>
                <button class="btn-save-config" onclick="saveSupabaseConfig()">Kết Nối Đám Mây</button>
            </div>
        </div>
    </div>
</div>

<div class="modal-overlay" id="archiveModal">
    <div class="modal-box">
        <div class="modal-header">
            <h2>📦 Kho Lưu Trữ</h2>
            <button class="modal-close-btn" onclick="closeArchive()">✕</button>
        </div>
        <div class="modal-body" id="archiveList"></div>
    </div>
</div>

<script>
    let events = [];
    let currentCategoryFilter = 'all';
    let currentMilestoneFilter = 'all';
    let currentView = localStorage.getItem('countdown_view_pref') || 'list';
    let editModeId = null;
    let supabaseClient = null;

    window.onload = function() {
        updateNotifyBtnUI();
        const savedUrl = localStorage.getItem('sb_url');
        const savedKey = localStorage.getItem('sb_key');
        if(savedUrl && savedKey) {
            document.getElementById('sbUrl').value = savedUrl;
            document.getElementById('sbKey').value = savedKey;
            initSupabase(savedUrl, savedKey);
            fetchFromCloud();
            // Đã từng kết nối -> thu gọn khối cấu hình mặc định
            setConfigBoxVisible(false);
        } else {
            events = JSON.parse(localStorage.getItem('countdown_events_v3')) || [];
            renderEvents();
            // Chưa từng kết nối -> tự mở khối cấu hình để nhắc người dùng
            setConfigBoxVisible(true);
        }
    };

    function setConfigBoxVisible(visible) {
        const box = document.getElementById('configContainer');
        const btn = document.getElementById('configToggleBtn');
        box.style.display = visible ? 'block' : 'none';
        btn.innerText = visible ? '⚙️ Ẩn cài đặt kết nối Supabase' : '⚙️ Cài đặt kết nối Supabase Cloud';
    }

    function toggleConfigBox() {
        const box = document.getElementById('configContainer');
        const isHidden = box.style.display === 'none';
        setConfigBoxVisible(isHidden);
    }

    function initSupabase(url, key) {
        if(url && key) {
            supabaseClient = supabase.createClient(url, key);
        }
    }

    function saveSupabaseConfig() {
        const url = document.getElementById('sbUrl').value.trim();
        const key = document.getElementById('sbKey').value.trim();
        if(!url || !key) { alert('Vui lòng nhập đủ thông tin!'); return; }
        
        localStorage.setItem('sb_url', url);
        localStorage.setItem('sb_key', key);
        initSupabase(url, key);
        alert('Kết nối Supabase Cloud thành công!');
        fetchFromCloud();
        setConfigBoxVisible(false);
    }

    function showSyncStatus(text, className, duration = 3000) {
        const box = document.getElementById('syncStatusBox');
        box.innerText = text;
        box.className = `sync-status ${className}`;
        box.style.display = 'block';
        if(duration > 0) setTimeout(() => { box.style.display = 'none'; }, duration);
    }

    async function fetchFromCloud() {
        if(!supabaseClient) return;
        showSyncStatus("🔄 Đang tải dữ liệu từ Supabase Cloud...", "sync-loading", 0);
        
        try {
            const { data, error } = await supabaseClient.from('events').select('*');
            if (error) throw error;
            
            events = data || [];
            localStorage.setItem('countdown_events_v3', JSON.stringify(events));
            renderEvents();
            showSyncStatus("✅ Đồng bộ đám mây hoàn tất!", "sync-success");
        } catch (err) {
            showSyncStatus("❌ Lỗi đồng bộ: " + err.message, "sync-failed");
        }
    }

    // ==== PHẦN NHẮC NHỞ THEO MỐC 30 / 15 / 5 / 1 NGÀY ====
    const REMINDER_MILESTONES = [30, 15, 5, 1];

    function updateNotifyBtnUI() {
        const btn = document.getElementById('notifyBtn');
        if (!btn) return;
        if ('Notification' in window && Notification.permission === 'granted') {
            btn.innerText = '🔔 Đã bật thông báo';
            btn.classList.add('notify-on');
        } else {
            btn.innerText = '🔔 Bật thông báo nhắc hẹn';
            btn.classList.remove('notify-on');
        }
    }

    function requestNotificationPermission() {
        if (!('Notification' in window)) {
            alert('Trình duyệt của bạn không hỗ trợ thông báo (Notification API).');
            return;
        }
        if (Notification.permission === 'granted') {
            alert('Thông báo đã được bật rồi! App sẽ tự nhắc khi còn 30, 15, 5, 1 ngày tới hạn (mỗi khi bạn mở tab này).');
            return;
        }
        Notification.requestPermission().then(permission => {
            updateNotifyBtnUI();
            if (permission === 'granted') {
                new Notification('🔔 Đã bật nhắc hẹn!', {
                    body: 'Bạn sẽ được nhắc khi sự kiện còn 30, 15, 5 hoặc 1 ngày nữa tới hạn.'
                });
            } else {
                alert('Bạn đã từ chối quyền thông báo. Có thể bật lại trong cài đặt trình duyệt.');
            }
        });
    }

    function getNotifiedLog() {
        return JSON.parse(localStorage.getItem('countdown_notified_log') || '{}');
    }

    function saveNotifiedLog(log) {
        localStorage.setItem('countdown_notified_log', JSON.stringify(log));
    }

    // Kiểm tra từng sự kiện đã tính toán (có daysLeft, computedTargetDate) và bắn thông báo
    // nếu daysLeft trùng mốc 30/15/5/1 và chưa nhắc cho lần đến hạn này.
    function checkAndNotifyReminders(processedEvents) {
        if (!('Notification' in window) || Notification.permission !== 'granted') return;

        const log = getNotifiedLog();
        let changed = false;

        processedEvents.forEach(event => {
            if (!REMINDER_MILESTONES.includes(event.daysLeft)) return;

            // Khóa nhắc nhở gắn với: id sự kiện + ngày đến hạn cụ thể (để sự kiện lặp lại vẫn được nhắc lại ở chu kỳ sau)
            const occurrenceKey = `${event.id}_${event.computedTargetDate.toISOString().slice(0,10)}`;
            const notifiedMilestones = log[occurrenceKey] || [];

            if (!notifiedMilestones.includes(event.daysLeft)) {
                const categoryText = getCategoryLabel(event);
                new Notification(`⏰ Còn ${event.daysLeft} ngày: ${event.title}`, {
                    body: `${categoryText} — hạn tới: ${event.computedTargetDate.toLocaleDateString('vi-VN')}`,
                    tag: occurrenceKey + '_' + event.daysLeft
                });
                notifiedMilestones.push(event.daysLeft);
                log[occurrenceKey] = notifiedMilestones;
                changed = true;
            }
        });

        if (changed) saveNotifiedLog(log);
    }

    function toggleRepeatUnit() {
        const repeatType = document.getElementById('repeatType').value;
        document.getElementById('customRepeatGroup').style.display = repeatType === 'custom' ? 'block' : 'none';
    }

    // Bảng nhãn + icon hiển thị cho từng hạng mục (dùng chung cho cả thẻ sự kiện lẫn thông báo nhắc hẹn)
    const CATEGORY_LABELS = {
        giayto: { icon: '📄', name: 'Giấy tờ' },
        quantrong: { icon: '⭐', name: 'Ngày quan trọng' },
        baoduong: { icon: '🔧', name: 'Bảo hành/Bảo dưỡng' },
        hoadon: { icon: '🧾', name: 'Hóa đơn' },
        suckhoe: { icon: '❤️', name: 'Sức khỏe' },
        khac: { icon: '🏷️', name: 'Khác' }
    };

    function getCategoryLabel(event) {
        const info = CATEGORY_LABELS[event.category] || CATEGORY_LABELS.khac;
        return `${info.icon} ${info.name}`;
    }

    function switchView(viewType) {
        currentView = viewType;
        localStorage.setItem('countdown_view_pref', viewType);
        const listElement = document.getElementById('eventsList');

        listElement.classList.remove('grid-view', 'compact-view');
        if (viewType === 'grid') listElement.classList.add('grid-view');
        else if (viewType === 'compact') listElement.classList.add('compact-view');

        ['list', 'grid', 'compact'].forEach(v => {
            const btn = document.getElementById(v + 'ViewBtn');
            if (btn) btn.classList.toggle('active', v === viewType);
        });
    }

    function handleSubmitEvent() {
        if (editModeId !== null) updateEvent(); else addEvent();
    }

    // Sinh ID cục bộ an toàn khi KHÔNG dùng Supabase (không còn dùng Date.now() để tránh trùng lặp)
    function generateLocalId() {
        if (window.crypto && crypto.randomUUID) return crypto.randomUUID();
        return 'local-' + Date.now() + '-' + Math.random().toString(16).slice(2);
    }

    let lastAddedEventId = null;

    function showToast(message, type = 'success') {
        const container = document.getElementById('toastContainer');
        const toast = document.createElement('div');
        toast.className = `toast toast-${type}`;
        toast.innerHTML = `<span class="toast-icon">${type === 'success' ? '✓' : '!'}</span><span></span>`;
        toast.querySelector('span:last-child').textContent = message;
        container.appendChild(toast);

        requestAnimationFrame(() => toast.classList.add('toast-show'));

        setTimeout(() => {
            toast.classList.remove('toast-show');
            setTimeout(() => toast.remove(), 300);
        }, 2500);
    }

    function parseTagsInput(rawValue) {
        if (!rawValue) return '';
        return rawValue.split(',').map(t => t.trim()).filter(Boolean).join(', ');
    }

    async function addEvent() {
        const title = document.getElementById('eventTitle').value.trim();
        const date = document.getElementById('eventDate').value;
        const category = document.getElementById('eventCategory').value;
        const repeatType = document.getElementById('repeatType').value;
        const tags = parseTagsInput(document.getElementById('eventTags').value);

        let repeatValue = 0, repeatUnit = 'none';
        if (repeatType === 'custom') {
            repeatValue = parseInt(document.getElementById('repeatValue').value) || 1;
            repeatUnit = document.getElementById('repeatUnit').value;
        }

        if (!title || !date) { alert('Vui lòng điền đầy đủ thông tin!'); return; }

        const newEventPayload = { title, date, category, repeatValue, repeatUnit, tags };

        if (supabaseClient) {
            // KHÔNG tự gán id ở client nữa: để Supabase tự sinh (thường là UUID)
            // rồi lấy lại bản ghi vừa tạo (kèm id thật) để hiển thị đúng.
            const { data, error } = await supabaseClient
                .from('events')
                .insert([newEventPayload])
                .select();
            if (error) {
                alert('Lỗi đẩy dữ liệu lên Cloud: ' + error.message + '\n\nLưu ý: bảng "events" trên Supabase cần có thêm cột "tags" kiểu text. Chạy lệnh SQL:\nALTER TABLE events ADD COLUMN tags text DEFAULT \'\';');
                return;
            }
            const savedEvent = (data && data[0]) ? data[0] : { ...newEventPayload, id: generateLocalId() };
            events.push(savedEvent);
            lastAddedEventId = savedEvent.id;
        } else {
            // Không có Supabase: lưu local với ID tự sinh an toàn
            const localEvent = { ...newEventPayload, id: generateLocalId() };
            events.push(localEvent);
            localStorage.setItem('countdown_events_v3', JSON.stringify(events));
            lastAddedEventId = localEvent.id;
        }

        renderEvents();
        resetForm();
        showToast(`Đã thêm "${title}" thành công!`);
    }

    function startEditEvent(id) {
        // So sánh theo chuỗi để hoạt động đúng với cả ID số (local) lẫn UUID (Supabase)
        const target = events.find(e => String(e.id) === String(id));
        if(!target) return;

        editModeId = id;
        document.getElementById('eventTitle').value = target.title;
        document.getElementById('eventDate').value = target.date;
        document.getElementById('eventCategory').value = target.category;
        document.getElementById('eventTags').value = target.tags || '';

        if (target.repeatUnit && target.repeatUnit !== 'none') {
            document.getElementById('repeatType').value = 'custom';
            document.getElementById('repeatValue').value = target.repeatValue;
            document.getElementById('repeatUnit').value = target.repeatUnit;
        } else {
            document.getElementById('repeatType').value = 'none';
        }

        toggleRepeatUnit();
        const submitBtn = document.getElementById('submitEventBtn');
        submitBtn.innerText = "Cập nhật";
        submitBtn.classList.add('btn-update-mode');
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    async function updateEvent() {
        const title = document.getElementById('eventTitle').value.trim();
        const date = document.getElementById('eventDate').value;
        const category = document.getElementById('eventCategory').value;
        const repeatType = document.getElementById('repeatType').value;
        const tags = parseTagsInput(document.getElementById('eventTags').value);
        let repeatValue = 0, repeatUnit = 'none';
        if (repeatType === 'custom') {
            repeatValue = parseInt(document.getElementById('repeatValue').value) || 1;
            repeatUnit = document.getElementById('repeatUnit').value;
        }

        events = events.map(e => {
            if(String(e.id) === String(editModeId)) {
                return { ...e, title, date, category, repeatValue, repeatUnit, tags };
            }
            return e;
        });
        renderEvents();

        if(supabaseClient) {
            const { error } = await supabaseClient.from('events')
                .update({ title, date, category, repeatValue, repeatUnit, tags })
                .eq('id', editModeId);
            if(error) { alert('Lỗi cập nhật Cloud: ' + error.message + '\n\nLưu ý: bảng "events" trên Supabase cần có thêm cột "tags" kiểu text. Chạy lệnh SQL:\nALTER TABLE events ADD COLUMN tags text DEFAULT \'\';'); return; }
        } else {
            localStorage.setItem('countdown_events_v3', JSON.stringify(events));
        }
        showToast(`Đã cập nhật "${title}" thành công!`);
        resetForm();
    }

    function resetForm() {
        editModeId = null;
        document.getElementById('eventTitle').value = '';
        document.getElementById('eventDate').value = '';
        document.getElementById('eventCategory').value = 'giayto';
        document.getElementById('eventTags').value = '';
        document.getElementById('repeatType').value = 'none';
        toggleRepeatUnit();
        const submitBtn = document.getElementById('submitEventBtn');
        submitBtn.innerText = "Thêm";
        submitBtn.classList.remove('btn-update-mode');
    }

    async function deleteEvent(id) {
        if(confirm('Bạn có chắc muốn xóa mục này?')) {
            events = events.filter(event => String(event.id) !== String(id));
            renderEvents();

            if(supabaseClient) {
                const { error } = await supabaseClient.from('events').delete().eq('id', id);
                if(error) alert('Lỗi xóa trên Cloud: ' + error.message);
            } else {
                localStorage.setItem('countdown_events_v3', JSON.stringify(events));
            }
            if (String(editModeId) === String(id)) resetForm();
            renderArchiveList();
        }
    }

    function formatDateISO(date) {
        const y = date.getFullYear();
        const m = String(date.getMonth() + 1).padStart(2, '0');
        const d = String(date.getDate()).padStart(2, '0');
        return `${y}-${m}-${d}`;
    }

    function addRepeatCycle(baseDate, repeatValue, repeatUnit) {
        const next = new Date(baseDate);
        if (repeatUnit === 'days') next.setDate(next.getDate() + repeatValue);
        else if (repeatUnit === 'weeks') next.setDate(next.getDate() + (repeatValue * 7));
        else if (repeatUnit === 'months') next.setMonth(next.getMonth() + repeatValue);
        else if (repeatUnit === 'years') next.setFullYear(next.getFullYear() + repeatValue);
        return next;
    }

    async function completeEvent(id) {
        const event = events.find(e => String(e.id) === String(id));
        if (!event) return;

        if (event.repeatUnit && event.repeatUnit !== 'none') {
            // Sự kiện có lặp lại: tự tính lịch tiếp theo từ ngày hiện tại
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            const nextDate = addRepeatCycle(today, event.repeatValue, event.repeatUnit);
            const nextDateStr = formatDateISO(nextDate);

            event.date = nextDateStr;
            renderEvents();

            if (supabaseClient) {
                const { error } = await supabaseClient.from('events').update({ date: nextDateStr }).eq('id', id);
                if (error) { alert('Lỗi cập nhật Cloud: ' + error.message); return; }
            } else {
                localStorage.setItem('countdown_events_v3', JSON.stringify(events));
            }
            showToast(`Đã hoàn thành! Lịch tiếp theo: ${nextDate.toLocaleDateString('vi-VN')}`);
        } else {
            // Sự kiện không lặp lại: chuyển vào Lưu trữ
            event.archived = true;
            renderEvents();

            if (supabaseClient) {
                const { error } = await supabaseClient.from('events').update({ archived: true }).eq('id', id);
                if (error) {
                    alert('Lỗi lưu trữ trên Cloud: ' + error.message + '\n\nLưu ý: bảng "events" trên Supabase cần có thêm cột "archived" kiểu boolean (mặc định false). Chạy lệnh SQL:\nALTER TABLE events ADD COLUMN archived boolean DEFAULT false;');
                    return;
                }
            } else {
                localStorage.setItem('countdown_events_v3', JSON.stringify(events));
            }
            showToast(`Đã hoàn thành và chuyển vào Lưu trữ`);
        }

        updateArchiveBadge();
        renderArchiveList();
    }

    function updateArchiveBadge() {
        const count = events.filter(e => e.archived).length;
        const badge = document.getElementById('archiveBadge');
        badge.textContent = count;
        badge.style.display = count > 0 ? 'inline-block' : 'none';
    }

    function openArchive() {
        renderArchiveList();
        document.getElementById('archiveModal').classList.add('open');
    }

    function closeArchive() {
        document.getElementById('archiveModal').classList.remove('open');
    }

    function renderArchiveList() {
        const container = document.getElementById('archiveList');
        const archivedEvents = events.filter(e => e.archived);

        if (archivedEvents.length === 0) {
            container.innerHTML = '<p style="text-align:center; color:#64748b; padding: 20px;">Chưa có sự kiện nào trong kho lưu trữ.</p>';
            return;
        }

        container.innerHTML = '';
        archivedEvents.forEach(event => {
            const item = document.createElement('div');
            item.className = 'archive-item';
            const formattedDate = new Date(event.date).toLocaleDateString('vi-VN');
            item.innerHTML = `
                <div class="archive-item-info">
                    <h4></h4>
                    <p>${getCategoryLabel(event)} — Hạn: ${formattedDate}</p>
                </div>
                <div class="archive-item-actions">
                    <button class="restore-btn">↩️ Khôi phục</button>
                    <button class="delete-btn">🗑️ Xóa</button>
                </div>
            `;
            item.querySelector('.archive-item-info h4').textContent = event.title;
            item.querySelector('.restore-btn').addEventListener('click', () => restoreEvent(event.id));
            item.querySelector('.delete-btn').addEventListener('click', () => deleteEvent(event.id));
            container.appendChild(item);
        });
    }

    async function restoreEvent(id) {
        const event = events.find(e => String(e.id) === String(id));
        if (!event) return;

        event.archived = false;
        renderEvents();
        renderArchiveList();
        updateArchiveBadge();

        if (supabaseClient) {
            const { error } = await supabaseClient.from('events').update({ archived: false }).eq('id', id);
            if (error) { alert('Lỗi khôi phục trên Cloud: ' + error.message); return; }
        } else {
            localStorage.setItem('countdown_events_v3', JSON.stringify(events));
        }
        showToast(`Đã khôi phục "${event.title}"`);
    }

    function getNextOccurrence(startDateStr, repeatValue, repeatUnit, today) {
        if (!startDateStr) return new Date();
        let targetDate = new Date(startDateStr);
        if (isNaN(targetDate.getTime())) return new Date();
        
        targetDate.setHours(0,0,0,0);
        if (repeatUnit === 'none' || targetDate >= today) return targetDate;

        while (targetDate < today) {
            if (repeatUnit === 'days') targetDate.setDate(targetDate.getDate() + repeatValue);
            else if (repeatUnit === 'weeks') targetDate.setDate(targetDate.getDate() + (repeatValue * 7));
            else if (repeatUnit === 'months') targetDate.setMonth(targetDate.getMonth() + repeatValue);
            else if (repeatUnit === 'years') targetDate.setFullYear(targetDate.getFullYear() + repeatValue);
        }
        return targetDate;
    }

    function applyFilters() {
        currentCategoryFilter = document.getElementById('filterCategory').value;
        currentMilestoneFilter = document.getElementById('filterMilestone').value;
        renderEvents();
    }

    function matchesMilestoneFilter(daysLeft, filterValue) {
        if (filterValue === 'all') return true;
        if (filterValue === 'expired') return daysLeft < 0;
        const threshold = parseInt(filterValue, 10);
        return daysLeft >= 0 && daysLeft <= threshold;
    }

    function renderEvents() {
        const listElement = document.getElementById('eventsList');
        listElement.innerHTML = '';
        updateArchiveBadge();

        const activeEvents = events.filter(event => !event.archived);

        if (activeEvents.length === 0) {
            listElement.innerHTML = '<p style="text-align:center; color:#64748b; padding: 30px;">Chưa có sự kiện nào.</p>';
            return;
        }

        const today = new Date();
        today.setHours(0,0,0,0);

        const processedEvents = activeEvents.map(event => {
            const computedTargetDate = getNextOccurrence(event.date, event.repeatValue, event.repeatUnit, today);
            const timeDiff = computedTargetDate.getTime() - today.getTime();
            const daysLeft = Math.ceil(timeDiff / (1000 * 3600 * 24));
            return { ...event, computedTargetDate, daysLeft };
        });

        // Luôn kiểm tra nhắc nhở trên TOÀN BỘ sự kiện, không phụ thuộc bộ lọc đang chọn
        checkAndNotifyReminders(processedEvents);

        // Áp dụng bộ lọc hạng mục + mốc hạn cho phần hiển thị
        const filteredEvents = processedEvents.filter(event => {
            const categoryOk = currentCategoryFilter === 'all' || event.category === currentCategoryFilter;
            const milestoneOk = matchesMilestoneFilter(event.daysLeft, currentMilestoneFilter);
            return categoryOk && milestoneOk;
        });

        filteredEvents.sort((a, b) => a.daysLeft - b.daysLeft);

        if (filteredEvents.length === 0) {
            listElement.innerHTML = '<p style="text-align:center; color:#64748b; padding: 30px;">Không có sự kiện nào khớp với bộ lọc đang chọn.</p>';
            switchView(currentView);
            return;
        }

        filteredEvents.forEach(event => {
            let statusClass = 'safe';
            let statusText = `Còn ${event.daysLeft} ngày`;

            if (event.daysLeft === 0) { statusClass = 'urgent'; statusText = `HÔM NAY! 🎉`; }
            else if (event.daysLeft < 0) { statusClass = 'expired'; statusText = `Đã qua ${Math.abs(event.daysLeft)} ngày`; }
            else if (event.daysLeft <= 7) { statusClass = 'urgent'; }
            else if (event.daysLeft <= 30) { statusClass = 'warning'; }

            const formattedDate = event.computedTargetDate.toLocaleDateString('vi-VN');
            const categoryText = getCategoryLabel(event);
            
            let repeatText = '';
            if (event.repeatUnit !== 'none') {
                const unitMap = { days: 'Ngày', weeks: 'Tuần', months: 'Tháng', years: 'Năm' };
                repeatText = `<span class="repeat-badge">🔁 Mỗi ${event.repeatValue} ${unitMap[event.repeatUnit]}</span>`;
            }

            let reminderText = '';
            if (REMINDER_MILESTONES.includes(event.daysLeft)) {
                reminderText = `<span class="reminder-badge">⏰ Mốc nhắc ${event.daysLeft} ngày</span>`;
            }

            const tagList = (event.tags || '').split(',').map(t => t.trim()).filter(Boolean);
            let tagsContainerHtml = '';
            if (tagList.length > 0) {
                tagsContainerHtml = `<div class="tags-container"></div>`;
            }

            const card = document.createElement('div');
            card.className = `event-card ${statusClass} cat-${event.category}`;
            if (lastAddedEventId !== null && String(event.id) === String(lastAddedEventId)) {
                card.classList.add('just-added');
            }

            // Dùng data-id + addEventListener thay vì nhúng trực tiếp id vào chuỗi onclick,
            // để tránh vỡ cú pháp khi id là UUID (có ký tự "-")
            card.innerHTML = `
                <div class="event-info">
                    <h3></h3>
                    <p style="font-weight: 600; color: #475569; margin-bottom: 4px;">${categoryText}</p>
                    <p>Hạn tới: <b>${formattedDate}</b></p>
                    ${repeatText}
                    ${reminderText}
                    ${tagsContainerHtml}
                </div>
                <div class="countdown-display">
                    <span class="days-left">${statusText}</span>
                    <div class="action-btns">
                        <button class="complete-btn" data-id="${event.id}">✅ <span class="btn-label">Hoàn thành</span></button>
                        <button class="edit-btn" data-id="${event.id}">✏️ <span class="btn-label">Sửa</span></button>
                        <button class="delete-btn" data-id="${event.id}">🗑️ <span class="btn-label">Xóa</span></button>
                    </div>
                </div>
            `;
            // Gán tên sự kiện bằng textContent để tránh lỗi XSS nếu tiêu đề chứa ký tự đặc biệt (<, >, ")
            card.querySelector('.event-info h3').textContent = event.title;

            // Gán từng tag bằng textContent (không dùng innerHTML) để tránh XSS từ nội dung tag tự do
            if (tagList.length > 0) {
                const tagsContainer = card.querySelector('.tags-container');
                tagList.forEach(tag => {
                    const chip = document.createElement('span');
                    chip.className = 'tag-chip';
                    chip.textContent = `#${tag}`;
                    tagsContainer.appendChild(chip);
                });
            }

            card.querySelector('.complete-btn').addEventListener('click', () => completeEvent(event.id));
            card.querySelector('.edit-btn').addEventListener('click', () => startEditEvent(event.id));
            card.querySelector('.delete-btn').addEventListener('click', () => deleteEvent(event.id));

            listElement.appendChild(card);
        });
        switchView(currentView);
        observeNewCardHighlight();
    }

    let newCardObserver = null;

    function observeNewCardHighlight() {
        if (lastAddedEventId === null) return;
        const card = document.querySelector('.event-card.just-added');
        if (!card) return;

        if (newCardObserver) newCardObserver.disconnect();

        newCardObserver = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('in-view');
                    newCardObserver.disconnect();
                    lastAddedEventId = null;
                }
            });
        }, { threshold: 0.5 });

        newCardObserver.observe(card);
    }
</script>
